services:
  postgres:
    image: postgres:16-alpine
    container_name: kshortner_postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kshortner


    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d kshortner"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      args:
        DATABASE_URL: postgresql://admin:password@postgres:5432/kshortner

    container_name: kshortner_backend

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      DATABASE_URL: postgresql://admin:password@postgres:5432/kshortner

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./server:/app
      - /app/node_modules

    command: sh -c "bunx prisma migrate deploy && bun run start"

  nginx:
    image: nginx:alpine

    container_name: kshortner_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - backend

volumes:
  postgres_data:
